PLG_CAPTCHA_REDEYED_XML_DESCRIPTION="Redeyed Sentinel: self-hosted CAPTCHA and IP-reputation. Free to install. Stays inert until a Site Key and Secret Key are set."

PLG_CAPTCHA_REDEYED_FIELD_SITE_KEY_LABEL="Site Key"
PLG_CAPTCHA_REDEYED_FIELD_SITE_KEY_DESC="Public Site Key from Redeyed Lab &#8594; Sentinel &#8594; Sites. Renders the widget."

PLG_CAPTCHA_REDEYED_FIELD_SECRET_KEY_LABEL="Secret Key"
PLG_CAPTCHA_REDEYED_FIELD_SECRET_KEY_DESC="Secret Key from Redeyed Lab &#8594; Sentinel &#8594; Sites (shown once). Verifies the challenge server-side at /sentinel/siteverify. No developer API key needed."

PLG_CAPTCHA_REDEYED_FIELD_BASE_URL_LABEL="Base URL"
PLG_CAPTCHA_REDEYED_FIELD_BASE_URL_DESC="Sentinel base URL. Defaults to https://redeyed.com."

PLG_CAPTCHA_REDEYED_FIELD_WIDGET_LABEL="Widget Type"
PLG_CAPTCHA_REDEYED_FIELD_WIDGET_DESC="Optional. Force a specific Sentinel widget (behavioral, checkbox, press &amp; hold, image pick, &#8230;). Leave on the adaptive default to let Sentinel choose. Rendered as data-widget."

PLG_CAPTCHA_REDEYED_FIELD_THEME_LABEL="Theme"
PLG_CAPTCHA_REDEYED_FIELD_THEME_DESC="Optional. Widget colour theme: auto, light or dark. Leave empty to inherit the widget default. Rendered as data-theme."

PLG_CAPTCHA_REDEYED_FIELD_SCHEME_LABEL="Colour Scheme"
PLG_CAPTCHA_REDEYED_FIELD_SCHEME_DESC="Optional. Named colour scheme for the widget. Leave empty to use the default. Rendered as data-scheme."

PLG_CAPTCHA_REDEYED_FIELD_DIFFICULTY_LABEL="Difficulty"
PLG_CAPTCHA_REDEYED_FIELD_DIFFICULTY_DESC="Optional. Minimum challenge strength: easy, medium, hard, max (or 1&#8211;6). This only RAISES difficulty above Sentinel's adaptive baseline &#8212; it never lowers it. Leave empty for the adaptive default. Rendered as data-difficulty."
